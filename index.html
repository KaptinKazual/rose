<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ROSE Budget Tool</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ROSE%20Budget%20Tool%22,%22short_name%22:%22ROSE%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23111827%22,%22theme_color%22:%22%23111827%22}">

    <style>
        :root { --bg: #111827; --card: #1f2937; --text: #f3f4f6; --accent: #38bdf8; --border: #374151; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: env(safe-area-inset-top, 20px) 20px 20px 20px; margin: 0; display: flex; justify-content: center; }
        .calc-box { width: 100%; max-width: 440px; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); box-sizing: border-box; margin-top: 10px; }
        h2 { margin: 0 0 5px; font-size: 22px; font-weight: 700; color: #fff; text-align: center; }
        .subtitle { font-size: 13px; color: #9ca3af; text-align: center; margin-bottom: 25px; }
        label { display: block; margin: 18px 0 6px; font-weight: 600; font-size: 14px; color: #e5e7eb; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .prefix { position: absolute; left: 12px; color: #9ca3af; font-size: 16px; pointer-events: none; }
        input { width: 100%; padding: 12px 12px 12px 28px; background: #111827; border: 1px solid var(--border); border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        input:focus { border-color: var(--accent); outline: none; }
        .sub-display { font-size: 12px; color: #9ca3af; margin-top: 4px; padding-left: 4px; display: block; }
        .result-box { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); padding: 18px; margin-top: 25px; border-radius: 10px; text-align: center; }
        .result-label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #9ca3af; margin-bottom: 4px; }
        .price { font-size: 32px; font-weight: 800; color: var(--accent); margin: 2px 0 6px; }
        .range { font-size: 15px; color: #fff; font-weight: 500; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; display: inline-block; }
        .tax-note { font-size: 11px; color: #6b7280; margin-top: 20px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>R.O.S.E. Home Budget Tool</h2>
    <div class="subtitle">Ready-use One-stop Sample Economics</div>
    
    <label>House Purchase Price</label>
    <div class="input-wrapper">
        <span class="prefix">$</span>
        <input type="number" id="homePrice" value="350000" oninput="calculatePITI()">
    </div>

    <label>Mortgage Interest Rate</label>
    <div class="input-wrapper">
        <span class="prefix">%</span>
        <input type="number" id="interestRate" value="6.0" step="0.1" oninput="calculatePITI()">
    </div>

    <label>Annual Home Insurance Premium</label>
    <div class="input-wrapper">
        <span class="prefix">$</span>
        <input type="number" id="annualInsurance" value="3500" step="10" oninput="calculatePITI()">
    </div>
    <!-- This line dynamically displays the monthly breakdown below the yearly input box -->
    <span class="sub-display" id="monthlyInsDisplay">Monthly breakdown: $291.67 / mo</span>

    <div class="result-box">
        <div class="result-label">Estimated Monthly Payment (PITI)</div>
        <div class="price" id="totalMonthly">$0.00</div>
        <div class="range" id="ballparkRange">Safe Budget Range: $0 - $0</div>
    </div>
    
    <div class="tax-note">
        App hardcodes current verified tax rates and integrates your 60% VA status ($150k ISD exemption floor / $10k city & county floors).
    </div>
</div>

<script>
function calculatePITI() {
    const price = parseFloat(document.getElementById('homePrice').value) || 0;
    const annualRate = parseFloat(document.getElementById('interestRate').value) || 0;
    const annualIns = parseFloat(document.getElementById('annualInsurance').value) || 0;

    // Convert annual insurance to a monthly value
    const monthlyIns = annualIns / 12;
    document.getElementById('monthlyInsDisplay').innerText = 'Monthly breakdown: $' + monthlyIns.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' / mo';

    // Standard P&I payment formula (30-year fixed timeline)
    const monthlyRate = (annualRate / 100) / 12;
    const totalPayments = 360;
    let monthlyPI = 0;
    
    if (monthlyRate === 0) {
        monthlyPI = price / totalPayments;
    } else {
        monthlyPI = price * (monthlyRate * Math.pow(1 + monthlyRate, totalPayments)) / (Math.pow(1 + monthlyRate, totalPayments) - 1);
    }

    // Current local baseline tax percentage rates
    const rateISD = 0.011922;
    const rateCity = 0.005954;
    const rateCounty = 0.00185938;

    // 1. ISD: $140,000 State Homestead + $10,000 VA Exemption = $150,000 total floor
const taxISD = Math.max(0, (price - 150000) * rateISD);
// 2. City: $5,000 Local Homestead (0.5% min) + $10,000 VA Exemption = $15,000 total floor
const taxCity = Math.max(0, (price - 15000) * rateCity); 
// 3. County: $10,000 VA Exemption floor (Stacks on standard county rules)
const taxCounty = Math.max(0, (price - 10000) * rateCounty);

    const annualTaxSum = taxISD + taxCity + taxCounty;
    const monthlyTax = annualTaxSum / 12;

    // Totaling monthly liabilities
    const totalPITI = monthlyPI + monthlyTax + monthlyIns;

    // Generating your exact ballpark range window
    const lowRange = Math.floor((totalPITI - 100) / 100) * 100;
    const highRange = Math.ceil((totalPITI + 100) / 100) * 100;

    document.getElementById('totalMonthly').innerText = '$' + totalPITI.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('ballparkRange').innerText = 'Safe Budget Range: $' + lowRange + ' to $' + highRange;
}
calculatePITI();
</script>

</body>
</html>
